<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Guardance{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #c9d1d9;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --danger:    #f85149;
      --warning:   #e3b341;
      --success:   #3fb950;
      --font-mono: 'Courier New', Courier, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 48px;
    }
    nav .brand {
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-decoration: none;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      padding: 0.25rem 0;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover, nav a.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    nav .spacer { flex: 1; }
    nav .version { color: var(--muted); font-size: 0.75rem; font-family: var(--font-mono); }

    /* Layout */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; }
    h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    /* Stat grid */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      text-align: center;
    }
    .stat .value {
      font-size: 2rem;
      font-weight: 700;
      font-family: var(--font-mono);
      line-height: 1.2;
    }
    .stat .label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
    }
    .stat.danger  .value { color: var(--danger); }
    .stat.warning .value { color: var(--warning); }
    .stat.success .value { color: var(--success); }
    .stat.info    .value { color: var(--accent); }

    /* Tables */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }
    thead th {
      background: var(--bg);
      color: var(--muted);
      font-weight: 600;
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:hover { background: rgba(88,166,255,0.04); }
    tbody td {
      padding: 0.5rem 0.75rem;
      font-family: var(--font-mono);
      color: var(--text);
    }
    tbody td.text { font-family: var(--font-sans); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 0.15em 0.55em;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 600;
      font-family: var(--font-sans);
      letter-spacing: 0.03em;
    }
    .badge-danger  { background: rgba(248,81,73,0.2);  color: var(--danger); }
    .badge-warning { background: rgba(227,179,65,0.2); color: var(--warning); }
    .badge-success { background: rgba(63,185,80,0.2);  color: var(--success); }
    .badge-info    { background: rgba(88,166,255,0.2); color: var(--accent); }
    .badge-muted   { background: rgba(139,148,158,0.15); color: var(--muted); }

    /* Alerts */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
    .alert-danger  { background: rgba(248,81,73,0.1);  border: 1px solid rgba(248,81,73,0.3); }
    .alert-info    { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.3); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty p { font-size: 0.875rem; }

    /* Links */
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Monospace spans */
    code {
      font-family: var(--font-mono);
      background: rgba(139,148,158,0.1);
      padding: 0.1em 0.35em;
      border-radius: 3px;
      font-size: 0.875em;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="brand" href="/">GUARDANCE</a>
    <a href="/" {% if active_page == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
    <a href="/ui/devices" {% if active_page == 'devices' %}class="active"{% endif %}>Devices</a>
    <a href="/ui/findings" {% if active_page == 'findings' %}class="active"{% endif %}>Findings</a>
    <span class="spacer"></span>
    <span class="version">Phase 2 — OT/ICS Monitor</span>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
