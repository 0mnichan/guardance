# Guardance — Docker Compose stack
#
# Services:
#   neo4j     — Neo4j 5 Community graph database
#   redpanda  — Redpanda single-node (Kafka-compatible message broker)
#   opa       — Open Policy Agent (Rego policy server)
#   guardance — Guardance web API + pipeline runner
#
# Quick start:
#   docker compose up -d
#
# Run one-shot ingestion against a PCAP directory:
#   docker compose run --rm guardance \
#     python -m src.main --pcap-dir data/pcaps
#
# Environment:
#   Copy .env.example to .env and edit before running.
#
# Notes:
#   - Neo4j data is persisted in the 'neo4j-data' named volume.
#   - Redpanda data is persisted in the 'redpanda-data' named volume.
#   - PCAPs are bind-mounted read-only from ./data/pcaps on the host.

# ---------------------------------------------------------------------------
# Shared network
# ---------------------------------------------------------------------------
networks:
  guardance-net:
    driver: bridge

# ---------------------------------------------------------------------------
# Persistent volumes
# ---------------------------------------------------------------------------
volumes:
  neo4j-data:
  redpanda-data:
  opa-bundles:

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # Neo4j 5 Community
  # --------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: guardance-neo4j
    restart: unless-stopped
    networks:
      - guardance-net
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j-data:/data
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # Redpanda (single-node, Kafka-compatible)
  # --------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: guardance-redpanda
    restart: unless-stopped
    networks:
      - guardance-net
    ports:
      - "9092:9092"   # Kafka API
      - "9644:9644"   # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --------------------------------------------------------------------------
  # Open Policy Agent
  # --------------------------------------------------------------------------
  opa:
    image: openpolicyagent/opa:latest
    container_name: guardance-opa
    restart: unless-stopped
    networks:
      - guardance-net
    ports:
      - "8181:8181"
    volumes:
      - ./src/policy/rules:/policies:ro
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /policies
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------------------------
  # Guardance web API
  # --------------------------------------------------------------------------
  guardance:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: guardance-api
    restart: unless-stopped
    networks:
      - guardance-net
    ports:
      - "8000:8000"
    volumes:
      - ./data/pcaps:/app/data/pcaps:ro
      - ./logs:/app/logs
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      REDPANDA_BOOTSTRAP_SERVERS: redpanda:9092
      OPA_URL: http://opa:8181
      GUARDANCE_API_KEYS: ${GUARDANCE_API_KEYS:-}
      GUARDANCE_HOST: "0.0.0.0"
      GUARDANCE_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      neo4j:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
